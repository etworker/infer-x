<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="/static/style.css">
</head>
<body>

      <span>Dashboard</span>
    </div>
    <div class="nav-item" data-page="models">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Models</span>

    <div class="nav-item" data-page="download">

    <div class="nav-item" data-page="instances">

    <div class="nav-item" data-page="presets">

      <span>Presets</span>

  <div class="main" id="page-dashboard"></div>
  <div class="main" id="page-models" style="display:none"></div>
  <div class="main" id="page-download" style="display:none"></div>
  <div class="main" id="page-instances" style="display:none"></div>
  <div class="main" id="page-presets" style="display:none"></div>
  <div class="main" id="page-benchmark" style="display:none"></div>
  <div class="main" id="page-config" style="display:none"></div>
</div>

<!-- Start Instance Modal -->
<div class="modal-overlay" id="modal-start">
  <div class="modal">
    <h3>Start Instance</h3>
    <div class="form-group">
      <label>Model</label>
      <select id="start-model"></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Backend</label>
        <select id="start-backend">
          <option value="llamacpp">llama.cpp</option>
          <option value="vllm">vLLM</option>
          <option value="sglang">SGLang</option>
          <option value="tgi">TGI</option>
          <option value="ollama">Ollama</option>
          <option value="tensorrt_llm">TensorRT-LLM</option>
          <option value="lmdeploy">LMDeploy</option>
          <option value="openvino">OpenVINO</option>
        </select>
      </div>
      <div class="form-group"><label>Preset</label><select id="start-preset"><option value="">None</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Port (auto if empty)</label><input id="start-port" type="number" placeholder="auto"></div>
      <div class="form-group"><label>Host</label><input id="start-host" value="0.0.0.0"></div>
    </div>

    <h4 style="margin:12px 0 8px;color:var(--text2);font-size:12px">Common Options</h4>
    <div class="form-row">
      <div class="form-group"><label>Context Size</label><input id="start-ctx" type="number" placeholder="default"></div>
      <div class="form-group"><label>GPU Layers</label><input id="start-ngl" placeholder="default"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Parallel Slots</label><input id="start-np" type="number" placeholder="default"></div>
      <div class="form-group"><label>Tensor Parallel Size</label><input id="start-tp" type="number" placeholder="1"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>GPU Memory Utilization</label><input id="start-gpu-mem-util" type="number" step="0.05" min="0" max="1" placeholder="0.9"></div>
      <div class="form-group"><label>Max Model Len</label><input id="start-max-model-len" type="number" placeholder="auto"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Dtype</label><select id="start-dtype"><option value="">default</option><option value="float16">float16</option><option value="bfloat16">bfloat16</option><option value="float32">float32</option></select></div>
      <div class="form-group"><label>Quantization</label><select id="start-quantization"><option value="">default</option><option value="awq">AWQ</option><option value="gptq">GPTQ</option></select></div>
    </div>
    <div class="form-group"><label>Extra Args (CLI flags, space separated)</label><input id="start-extra-args" placeholder="--mlock --no-mmap -t 8"></div>

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-start')">Cancel</button>
      <button class="btn-primary" onclick="doStartInstance()">Start</button>
    </div>
  </div>
</div>

<!-- Download Modal -->
<div class="modal-overlay" id="modal-download">
  <div class="modal">
    <h3>Download Model</h3>
    <div class="form-group">
      <label>Source</label>
      <select id="dl-source" onchange="onDlSourceChange()">
        <option value="hf">HuggingFace</option>
        <option value="hf_mirror">HF Mirror</option>
        <option value="ms">ModelScope</option>
        <option value="url">URL</option>
      </select>
    </div>
    <div class="form-group" id="dl-repo-group">
      <label>Repository (user/repo)</label>
      <input id="dl-repo" placeholder="e.g. Qwen/Qwen3-8B-GGUF">
    </div>
    <div class="form-group" id="dl-file-group">
      <label>Filename (optional, auto-detect)</label>
      <input id="dl-file" placeholder="e.g. qwen3-8b-q4_k_m.gguf">
    </div>
    <div class="form-group" id="dl-url-group" style="display:none">
      <label>Download URL</label>
      <input id="dl-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Save as (optional)</label>
      <input id="dl-save" placeholder="filename.gguf">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-download')">Cancel</button>
      <button class="btn-primary" onclick="doDownload()">Download</button>
    </div>
  </div>
</div>

<!-- Log Modal -->
<div class="modal-overlay" id="modal-log">
  <div class="modal" style="width:700px">
    <h3>Instance Logs</h3>
    <div class="log-box" id="log-content">Loading...</div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-log')">Close</button>
    </div>
  </div>
</div>

<script src="/static/app.js?v=3"></script>
</body>
</html>
